<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <meta
      name="description"
      content="Single-page portfolio with profile, projects, and articles."
    />
  </head>
  <body>
    <main class="container">
      <section id="profile" class="card" aria-labelledby="profile-title">
        <h1 id="profile-title">Profile</h1>
        <div id="profile-content" class="profile-content" aria-live="polite"></div>
      </section>

      <nav id="page-nav" class="page-nav" aria-label="Primary">
        <a href="#/" data-route="home">Home</a>
        <span class="separator" aria-hidden="true">|</span>
        <a href="#/projects" data-route="projects">Projects</a>
        <span class="separator" aria-hidden="true">|</span>
        <a href="#/articles" data-route="articles">Articles</a>
      </nav>

      <section
        id="featured-projects"
        class="card page-section"
        data-page="home"
        aria-labelledby="featured-projects-title"
      >
        <h2 id="featured-projects-title">Featured Projects</h2>
        <div id="featured-projects-list" class="portfolio-list" aria-live="polite"></div>
      </section>

      <section
        id="featured-articles"
        class="card page-section"
        data-page="home"
        aria-labelledby="featured-articles-title"
      >
        <h2 id="featured-articles-title">Featured Articles</h2>
        <div id="featured-articles-list" class="portfolio-list" aria-live="polite"></div>
      </section>

      <section
        id="projects"
        class="card page-section"
        data-page="projects"
        aria-labelledby="projects-title"
        hidden
      >
        <h2 id="projects-title">Projects</h2>
        <div id="projects-list" class="portfolio-list" aria-live="polite"></div>
      </section>

      <section
        id="articles"
        class="card page-section"
        data-page="articles"
        aria-labelledby="articles-title"
        hidden
      >
        <h2 id="articles-title">Articles</h2>
        <div id="articles-list" class="portfolio-list" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
