<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <meta
      name="description"
      content="Single-page portfolio with profile and project showcase."
    />
  </head>
  <body>
    <main class="container">
      <section id="profile" class="card" aria-labelledby="profile-title">
        <h1 id="profile-title">Profile</h1>
        <div id="profile-content" class="profile-content" aria-live="polite"></div>
      </section>

      <section id="portfolio" class="card" aria-labelledby="portfolio-title">
        <h2 id="portfolio-title">Portfolio</h2>
        <div id="portfolio-list" class="portfolio-list" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
